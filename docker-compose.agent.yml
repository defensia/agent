# Defensia Agent — Docker Compose snippet
# Add this to your existing docker-compose.yml or run standalone:
#   DEFENSIA_TOKEN=<your-token> docker compose -f docker-compose.agent.yml up -d
#
# Get your token at: https://defensia.cloud/dashboard → Add Server

services:
  defensia-agent:
    image: ghcr.io/defensia/agent:latest
    container_name: defensia-agent
    restart: unless-stopped
    privileged: true
    network_mode: host
    pid: host
    environment:
      - DEFENSIA_TOKEN=${DEFENSIA_TOKEN}
      - DEFENSIA_SERVER_URL=${DEFENSIA_SERVER_URL:-https://defensia.cloud}
      - DEFENSIA_AGENT_NAME=${DEFENSIA_AGENT_NAME:-}
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - defensia-config:/etc/defensia

volumes:
  defensia-config:

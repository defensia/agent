apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "defensia-agent.fullname" . }}
  labels:
    {{- include "defensia-agent.labels" . | nindent 4 }}
rules:
  # Read pods on this node (inventory + crash detection)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read nodes (kubelet version, labels)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Watch events (CrashLoop, OOM, Evicted)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Read namespaces (for NetworkPolicy audit)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
  # Read configmaps in kube-system (cluster name detection)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  # Read ingresses (host discovery for WAF)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["list"]
  # Read network policies (security audit)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["list"]

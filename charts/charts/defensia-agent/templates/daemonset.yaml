apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "defensia-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "defensia-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "defensia-agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "defensia-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "defensia-agent.serviceAccountName" . }}
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: defensia-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: true
          env:
            - name: DEFENSIA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "defensia-agent.fullname" . }}
                  key: api-key
            - name: DEFENSIA_SERVER_URL
              value: {{ .Values.serverUrl | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.clusterName }}
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: host-log
              mountPath: /var/log
              readOnly: true
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
              readOnly: true
            - name: agent-config
              mountPath: /etc/defensia
      volumes:
        - name: host-log
          hostPath:
            path: /var/log
            type: DirectoryOrCreate
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: FileOrCreate
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: FileOrCreate
        - name: agent-config
          emptyDir: {}

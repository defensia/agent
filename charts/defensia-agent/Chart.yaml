apiVersion: v2
name: defensia-agent
description: Real-time attack detection and blocking for Linux servers — SSH brute force, WAF, bot management, geo-blocking, and threat intelligence in a single lightweight agent.
type: application
version: 0.2.0
appVersion: "0.9.80"
home: https://defensia.cloud
sources:
  - https://github.com/defensia/agent
keywords:
  - security
  - waf
  - firewall
  - intrusion-detection
  - linux
  - server
  - bot-detection
  - brute-force
  - threat-intelligence
  - server-monitoring
kubeVersion: ">=1.22.0-0"
maintainers:
  - name: Defensia
    email: support@defensia.cloud
    url: https://defensia.cloud
icon: https://defensia.cloud/img/logo.svg
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/defensia/agent#readme
    - name: support
      url: https://github.com/defensia/agent/issues
    - name: Dashboard
      url: https://defensia.cloud
  artifacthub.io/screenshots: |
    - title: Dashboard
      url: https://raw.githubusercontent.com/defensia/agent/main/docs/01-dashboard.png
    - title: Events Feed
      url: https://raw.githubusercontent.com/defensia/agent/main/docs/02-events.png
    - title: WAF Analytics
      url: https://raw.githubusercontent.com/defensia/agent/main/docs/04-waf.png
  artifacthub.io/changes: |
    - kind: added
      description: Mail server protection — Postfix SASL, Dovecot IMAP/POP3, Roundcube (11 patterns)
    - kind: added
      description: Database auth monitoring — MySQL, PostgreSQL, MongoDB brute force + port exposure alerts
    - kind: added
      description: Geoblocking fix — blocked_countries now correctly read from sync config
    - kind: security
      description: Upgrade Go from 1.22 to 1.26 — fixes 25 CVEs in stdlib
  artifacthub.io/images: |
    - name: defensia-agent
      image: ghcr.io/defensia/agent:0.9.80
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "false"

apiVersion: v2
name: defensia-agent
description: Kubernetes-native security agent — Ingress WAF, pod monitoring, NetworkPolicy audit, SSH brute force detection, CVE scanning, and automated threat blocking. Deploys as a DaemonSet on every node.
type: application
version: 0.3.1
appVersion: "0.9.85"
home: https://defensia.cloud
sources:
  - https://github.com/defensia/agent
keywords:
  - security
  - waf
  - firewall
  - intrusion-detection
  - kubernetes
  - k8s
  - daemonset
  - ingress
  - runtime-security
  - container-security
  - bot-detection
  - brute-force
  - threat-intelligence
  - server-monitoring
  - networkpolicy
  - pod-monitoring
kubeVersion: ">=1.22.0-0"
maintainers:
  - name: Defensia
    email: support@defensia.cloud
    url: https://defensia.cloud
icon: https://defensia.cloud/img/logo.svg
annotations:
  artifacthub.io/category: security
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/defensia/agent#readme
    - name: support
      url: https://github.com/defensia/agent/issues
    - name: Dashboard
      url: https://defensia.cloud
    - name: Kubernetes Security
      url: https://defensia.cloud/kubernetes-security
    - name: OpenSSF Scorecard
      url: https://securityscorecards.dev/viewer/?uri=github.com/defensia/agent
  artifacthub.io/screenshots: |
    - title: Dashboard
      url: https://raw.githubusercontent.com/defensia/agent/main/docs/01-dashboard.png
    - title: Events Feed
      url: https://raw.githubusercontent.com/defensia/agent/main/docs/02-events.png
    - title: WAF Analytics
      url: https://raw.githubusercontent.com/defensia/agent/main/docs/04-waf.png
  artifacthub.io/changes: |
    - kind: added
      description: "Kubernetes Level 5: K8s API integration via client-go — pod inventory, Ingress host discovery, NetworkPolicy audit, pod event watcher (CrashLoop, OOM, evictions)"
    - kind: added
      description: "Ingress WAF: reads nginx-ingress/Traefik logs for cluster-wide OWASP attack detection"
    - kind: added
      description: "Containerd log adapter: strips CRI-O prefix from K8s container logs automatically"
    - kind: added
      description: "RBAC templates: ServiceAccount, ClusterRole (read-only), ClusterRoleBinding"
    - kind: added
      description: "FTP brute force detection: vsftpd, ProFTPD, Pure-FTPd"
    - kind: added
      description: "WAF request counter in heartbeat for analytics"
    - kind: security
      description: "OpenSSF Scorecard, SECURITY.md, Dependabot, scoped token permissions"
  artifacthub.io/images: |
    - name: defensia-agent
      image: ghcr.io/defensia/agent:0.9.83
  artifacthub.io/prerelease: "false"
  artifacthub.io/containsSecurityUpdates: "true"

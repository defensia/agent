{{/*
Role for writing banned IPs to a ConfigMap in the ingress controller namespace.
Only grants access to the specific ConfigMap "defensia-blocked-ips".
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "defensia-agent.fullname" . }}-ban-writer
  namespace: {{ .Values.ingressNamespace | default "ingress-nginx" }}
  labels:
    {{- include "defensia-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update"]
    resourceNames: ["defensia-blocked-ips"]
  # Need create without resourceNames for initial creation
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "defensia-agent.fullname" . }}-ban-writer
  namespace: {{ .Values.ingressNamespace | default "ingress-nginx" }}
  labels:
    {{- include "defensia-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "defensia-agent.fullname" . }}-ban-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "defensia-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}

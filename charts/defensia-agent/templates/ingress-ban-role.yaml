{{/*
Role for patching the ingress controller's ConfigMap with deny rules.
Only grants access to the specific ConfigMap used by nginx-ingress.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "defensia-agent.fullname" . }}-ban-writer
  namespace: {{ .Values.ingressNamespace | default "ingress-nginx" }}
  labels:
    {{- include "defensia-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "update"]
    resourceNames: ["ingress-nginx-controller"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "defensia-agent.fullname" . }}-ban-writer
  namespace: {{ .Values.ingressNamespace | default "ingress-nginx" }}
  labels:
    {{- include "defensia-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "defensia-agent.fullname" . }}-ban-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "defensia-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
